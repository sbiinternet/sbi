<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Management</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

.header{
background:#2563eb;
color:white;
padding:18px;
text-align:center;
font-size:24px;
}

.top{
padding:20px;
text-align:right;
}

button{
padding:10px 18px;
border:none;
background:#2563eb;
color:white;
border-radius:6px;
cursor:pointer;
}

table{
width:95%;
margin:auto;
background:white;
border-collapse:collapse;
box-shadow:0 2px 8px rgba(0,0,0,.15);
}

th{
background:#2563eb;
color:white;
padding:12px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

img{
width:55px;
height:55px;
border-radius:50%;
}

.admin{
color:#16a34a;
font-weight:bold;
}

.manager{
color:#2563eb;
font-weight:bold;
}

.tech{
color:#ea580c;
font-weight:bold;
}

.collector{
color:#9333ea;
font-weight:bold;
}

.reseller{
color:#dc2626;
font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
👨‍💼 Staff Management
</div>

<div class="top">

<button>➕ Add Staff</button>

</div>

<table>

<tr>

<th>Photo</th>

<th>Name</th>

<th>Mobile</th>

<th>Role</th>

<th>Status</th>

<th>Action</th>

</tr>

<tr>

<td><img src="https://via.placeholder.com/55"></td>

<td>Admin</td>

<td>01700000000</td>

<td class="admin">Administrator</td>

<td>Active</td>

<td>

<button>View</button>

<button>Edit</button>

</td>

</tr>

<tr>

<td><img src="https://via.placeholder.com/55"></td>

<td>Manager</td>

<td>01800000000</td>

<td class="manager">Manager</td>

<td>Active</td>

<td>

<button>View</button>

<button>Edit</button>

</td>

</tr>

<tr>

<td><img src="https://via.placeholder.com/55"></td>

<td>Technician</td>

<td>01900000000</td>

<td class="tech">Technician</td>

<td>Active</td>

<td>

<button>View</button>

<button>Edit</button>

</td>

</tr>

<tr>

<td><img src="https://via.placeholder.com/55"></td>

<td>Collector</td>

<td>01600000000</td>

<td class="collector">Collector</td>

<td>Active</td>

<td>

<button>View</button>

<button>Edit</button>

</td>

</tr>

<tr>

<td><img src="https://via.placeholder.com/55"></td>

<td>Reseller</td>

<td>01500000000</td>

<td class="reseller">Reseller</td>

<td>Active</td>

<td>

<button>View</button>

<button>Edit</button>

</td>

</tr>

</table>

</html>
