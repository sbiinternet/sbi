<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBI INTERNET - Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#2563eb);
}

.login-box{
width:350px;
background:#fff;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,.25);
}

.logo{
text-align:center;
font-size:30px;
margin-bottom:10px;
}

h2{
text-align:center;
color:#2563eb;
margin-bottom:5px;
}

p{
text-align:center;
color:#666;
margin-bottom:20px;
}

input{
width:100%;
padding:13px;
margin:10px 0;
border:1px solid #ddd;
border-radius:8px;
font-size:15px;
}

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#1d4ed8;
}

.footer{
margin-top:20px;
text-align:center;
font-size:13px;
color:#888;
}

</style>

</head>

<body>

<div class="login-box">

<div class="logo">🌐</div>

<h2>SBI INTERNET</h2>

<p>ISP Management System</p>

<input id="user" type="text" placeholder="Username">

<input id="pass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="footer">

Version 1.0 <br>

© SBI INTERNET

</div>

</div>

<script>

function login(){

let u=document.getElementById("user").value;

let p=document.getElementById("pass").value;

if(u=="admin" && p=="1234"){

window.location="dashboard.html";

}else{

alert("Invalid Username or Password");

}

}

</script>

</body>
</html>
