<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SBI INTERNET Login</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f172a;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#2563eb;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>

</head>
<body>

<div class="login-box">

<h2>SBI INTERNET</h2>
<p>Admin Login</p>

<input type="text" id="user" placeholder="Username">

<input type="password" id="pass" placeholder="Password">

<button onclick="login()">Login</button>

</div>

<script>

function login(){

let u=document.getElementById("user").value.trim();
let p=document.getElementById("pass").value.trim();

if(u==="admin" && p==="1234"){

window.location.href="dashboard.html";

}else{

alert("Invalid Username or Password");

}

}

</script>

</body>
</html>
