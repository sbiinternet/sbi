<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Customer - SBI INTERNET</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f5f7fb;
margin:0;
padding:20px;
}
.container{
max-width:900px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 2px 10px rgba(0,0,0,.1);
}
h2{
text-align:center;
color:#2563eb;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}
label{
font-weight:bold;
display:block;
margin-bottom:5px;
}
input,select,textarea{
width:100%;
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}
textarea{
height:80px;
}
.btn{
margin-top:20px;
display:flex;
gap:10px;
}
button{
flex:1;
padding:12px;
border:none;
border-radius:6px;
color:#fff;
font-size:16px;
cursor:pointer;
}
.save{
background:#16a34a;
}
.reset{
background:#dc2626;
}
</style>

</head>
<body>

<div class="container">

<h2>➕ Add New Customer</h2>

<div class="grid">

<div>
<label>Customer ID</label>
<input type="text">
</div>

<div>
<label>Full Name</label>
<input type="text">
</div>

<div>
<label>Mobile Number</label>
<input type="text">
</div>

<div>
<label>Email</label>
<input type="email">
</div>

<div>
<label>Address</label>
<input type="text">
</div>

<div>
<label>Google Maps Location</label>
<input type="text" placeholder="Google Maps Link">
</div>

<div>
<label>Package</label>
<select>
<option>20 Mbps</option>
<option>30 Mbps</option>
<option>40 Mbps</option>
<option>60 Mbps</option>
<option>100 Mbps</option>
</select>
</div>

<div>
<label>Monthly Bill</label>
<input type="number">
</div>

<div>
<label>PPPoE Username</label>
<input type="text">
</div>

<div>
<label>PPPoE Password</label>
<input type="password">
</div>

<div>
<label>IP Address</label>
<input type="text">
</div>

<div>
<label>MAC Address</label>
<input type="text">
</div>

<div>
<label>Profile Photo</label>
<input type="file">
</div>

<div>
<label>NID Front</label>
<input type="file">
</div>

<div>
<label>NID Back</label>
<input type="file">
</div>

<div>
<label>Connection Status</label>
<select>
<option>Active</option>
<option>Inactive</option>
</select>
</div>

<div style="grid-column:1/-1;">
<label>Remarks</label>
<textarea></textarea>
</div>

</div>

<div class="btn">
<button class="save">💾 Save Customer</button>
<button class="reset">🔄 Reset</button>
</div>

</div>

</body>
</html>
